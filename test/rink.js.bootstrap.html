<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Rink.js - Bootstrap</title>
        <link rel="stylesheet" href="css/styles.css">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
        <script src="../dist/rink.js"></script>
        <script src="js/scripts.js"></script>
    </head>

    <body data-random-attribute="attribute-value" name="body" id="body" style="font-family: default;">
        <div class="header">
            <img src="images/image.png" class="logo" />
            <h1 id="header">Rink.js - Bootstrap</h1>
            <p id="description">This is a basic example of how to use Rink.js alongside Bootstrap.</p>
        </div>

        <div class="contents">
            <p><a href="https://www.william-troup.com/" data-rink-js-sm="_blank" target="_self">Test Link SM</a></p>
            <p><a href="https://www.william-troup.com/" data-rink-js-md="_blank" target="_self">Test Link MD</a></p>
            <p><a href="https://www.william-troup.com/" data-rink-js-lg="_blank" target="_self">Test Link LG</a></p>
            <p><a href="https://www.william-troup.com/" data-rink-js-xl="_blank" target="_self">Test Link XL</a></p>
            <p><a href="https://www.william-troup.com/" data-rink-js-xxl="_blank" target="_self">Test Link XXL</a></p>
            <p><a href="https://www.william-troup.com/" data-rink-js-800="_blank">Test Link (800)</a></p>
        </div>

        <div class="contents">
            <h2>Configuration:</h2>
            <button class="btn btn-primary" onclick="setupConfiguration();">Set Configuration</button>
            <br />

            <h2>Additional Data:</h2>
            <button class="btn btn-primary" onclick="getVersion();">Get Version</button>
        </div>
    </body>
</html>
